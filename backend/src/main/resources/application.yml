server:
  port: 8088

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/book_recommend?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: BookRecommendSecretKey2024BookRecommendSecretKey2024
  expiration: 86400000

app:
  admin-bootstrap:
    enabled: true
    sync-password-on-startup: true
    username: admin
    password: admin123456
    nickname: Admin
  recommend-cache:
    refresh-cron: 0 0 3 * * ?
    refresh-zone: Asia/Shanghai
  file-storage:
    upload-dir: uploads

logging:
  level:
    com.book: debug
